<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Barcode Billing System</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#ececec;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:450px;
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    font-size:38px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

#reader{
    width:100%;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:25px;
}

/* ADD PRODUCT */

.add-product{
    background:#f7f7f7;
    padding:15px;
    border-radius:20px;
    margin-bottom:25px;
}

.add-product h2{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    height:45px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid #ccc;
    padding-left:12px;
    font-size:16px;
}

.add-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:15px;
    background:#6a00ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

/* BARCODE */

.barcode-box{
    text-align:center;
    margin-top:15px;
}

svg{
    width:100%;
    max-width:300px;
}

/* BILL */

.bill{
    background:#fafafa;
    border-radius:20px;
    padding:20px;
    border:2px dashed #ccc;
}

.bill h2{
    text-align:center;
    margin-bottom:15px;
}

.bill-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    font-size:16px;
}

.qty-box{
    display:flex;
    align-items:center;
    gap:8px;
}

.qty-btn{
    width:28px;
    height:28px;
    border:none;
    border-radius:50%;
    background:#6a00ff;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:8px;
    cursor:pointer;
}

.total{
    margin-top:15px;
    border-top:2px solid #ddd;
    padding-top:10px;
    display:flex;
    justify-content:space-between;
    font-size:22px;
    font-weight:bold;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.action-btn{
    flex:1;
    height:55px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.print-btn{
    background:#6a00ff;
    color:white;
}

.clear-btn{
    background:#ff4d4d;
    color:white;
}

@media print{

    body{
        background:white;
    }

    #reader,
    .buttons,
    .add-product,
    .subtitle,
    .remove-btn,
    .qty-btn{
        display:none;
    }

    .container{
        width:80mm;
        box-shadow:none;
        padding:0;
    }

}

</style>

</head>

<body>

<div class="container">

    <h1>JPT Store</h1>

    <div class="subtitle">
        Smart Barcode Billing System
    </div>

    <div id="reader"></div>

    <!-- ADD PRODUCT -->

    <div class="add-product">

        <h2>Add New Product</h2>

        <input type="text" id="barcode" placeholder="Barcode">

        <input type="text" id="productName" placeholder="Product Name">

        <input type="number" id="productPrice" placeholder="Product Price">

        <button class="add-btn" onclick="addProduct()">
            Add Product & Generate Barcode
        </button>

        <div class="barcode-box">
            <svg id="barcodeImage"></svg>
        </div>

    </div>

    <!-- BILL -->

    <div class="bill">

        <h2>Customer Bill</h2>

        <div id="billItems"></div>

        <div class="total">

            <span>Total</span>

            <span id="total">₹0</span>

        </div>

    </div>

    <!-- BUTTONS -->

    <div class="buttons">

        <button class="action-btn clear-btn" onclick="clearBill()">
            Clear
        </button>

        <button class="action-btn print-btn" onclick="window.print()">
            Print Bill
        </button>

    </div>

</div>

<script>

/* BEEP SOUND */

const beep = new Audio(
'https://actions.google.com/sounds/v1/cartoon/beep_short.ogg'
);

/* PRODUCT DATABASE */

let products = {

    "12345":{
        name:"Burger",
        price:120
    },

    "23456":{
        name:"Pizza",
        price:250
    }

};

let bill = {};
let total = 0;

/* ADD PRODUCT */

function addProduct(){

    let barcode = document.getElementById("barcode").value;

    let name = document.getElementById("productName").value;

    let price = document.getElementById("productPrice").value;

    if(barcode === "" || name === "" || price === ""){

        alert("Fill all fields");

        return;
    }

    products[barcode] = {

        name:name,
        price:Number(price)

    };

    /* GENERATE BARCODE */

    JsBarcode("#barcodeImage", barcode, {

        format:"CODE128",
        displayValue:true

    });

    alert("Product Added Successfully");

}

/* ADD TO BILL */

function addToBill(barcode){

    let product = products[barcode];

    beep.play();

    if(bill[barcode]){

        bill[barcode].qty++;

    }
    else{

        bill[barcode] = {

            name:product.name,
            price:product.price,
            qty:1

        };

    }

    renderBill();
}

/* RENDER BILL */

function renderBill(){

    let billItems = document.getElementById("billItems");

    billItems.innerHTML = "";

    total = 0;

    for(let code in bill){

        let item = bill[code];

        let itemTotal = item.price * item.qty;

        total += itemTotal;

        let div = document.createElement("div");

        div.classList.add("bill-item");

        div.innerHTML = `

            <div>

                <b>${item.name}</b><br>

                ₹${item.price} x ${item.qty}

            </div>

            <div class="qty-box">

                <button class="qty-btn"
                onclick="changeQty('${code}', -1)">
                -
                </button>

                ${item.qty}

                <button class="qty-btn"
                onclick="changeQty('${code}', 1)">
                +
                </button>

                <button class="remove-btn"
                onclick="removeItem('${code}')">
                X
                </button>

            </div>

        `;

        billItems.appendChild(div);

    }

    document.getElementById("total").innerText =
    "₹" + total;
}

/* CHANGE QUANTITY */

function changeQty(code, value){

    bill[code].qty += value;

    if(bill[code].qty <= 0){

        delete bill[code];

    }

    renderBill();
}

/* REMOVE ITEM */

function removeItem(code){

    delete bill[code];

    renderBill();
}

/* CLEAR BILL */

function clearBill(){

    bill = {};

    renderBill();
}

/* SCANNER FIX */

let lastScannedCode = "";
let scanCooldown = false;

/* SCAN SUCCESS */

function onScanSuccess(decodedText){

    if(scanCooldown){
        return;
    }

    if(decodedText === lastScannedCode){
        return;
    }

    lastScannedCode = decodedText;

    scanCooldown = true;

    setTimeout(() => {

        scanCooldown = false;

        lastScannedCode = "";

    }, 2000);

    if(products[decodedText]){

        addToBill(decodedText);

    }
    else{

        alert("Product Not Found");

    }

}

/* BACK CAMERA */

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

    if(devices && devices.length){

        let backCamera = devices.find(device =>
            device.label.toLowerCase().includes('back')
        );

        let cameraId = backCamera ?
        backCamera.id : devices[0].id;

        html5QrCode.start(

            cameraId,

            {
                fps:10,
                qrbox:250
            },

            onScanSuccess

        );

    }

}).catch(err => {

    console.log(err);

});

</script>

</body>
</html>

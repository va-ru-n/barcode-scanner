<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barcode Billing System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:420px;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:40px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

#reader{
    width:100%;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.bill{
    background:#fafafa;
    border-radius:20px;
    padding:20px;
    border:2px dashed #ccc;
}

.bill h2{
    text-align:center;
    margin-bottom:15px;
}

.bill-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:18px;
}

.total{
    margin-top:15px;
    border-top:2px solid #ddd;
    padding-top:10px;
    display:flex;
    justify-content:space-between;
    font-size:22px;
    font-weight:bold;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

button{
    flex:1;
    height:55px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.print-btn{
    background:#6a00ff;
    color:white;
}

.clear-btn{
    background:#ff4d4d;
    color:white;
}

@media print{

    body{
        background:white;
    }

    #reader,
    .buttons,
    .subtitle{
        display:none;
    }

    .container{
        width:80mm;
        box-shadow:none;
        padding:0;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1>JPT Store</h1>

    <div class="subtitle">
        Barcode Billing System
    </div>

    <div id="reader"></div>

    <div class="bill">

        <h2>Customer Bill</h2>

        <div id="billItems"></div>

        <div class="total">
            <span>Total</span>
            <span id="total">₹0</span>
        </div>

    </div>

    <div class="buttons">

        <button class="clear-btn" onclick="clearBill()">
            Clear
        </button>

        <button class="print-btn" onclick="window.print()">
            Print Bill
        </button>

    </div>

</div>

<script>

let total = 0;

const products = {

    "12345": {
        name:"Burger",
        price:120
    },

    "23456": {
        name:"Pizza",
        price:250
    },

    "34567": {
        name:"Coffee",
        price:60
    },

    "45678": {
        name:"Fries",
        price:80
    }

};

function addToBill(name, price){

    let billItems = document.getElementById("billItems");

    let item = document.createElement("div");

    item.classList.add("bill-item");

    item.innerHTML = `
        <span>${name}</span>
        <span>₹${price}</span>
    `;

    billItems.appendChild(item);

    total += price;

    document.getElementById("total").innerText = "₹" + total;
}

function clearBill(){

    document.getElementById("billItems").innerHTML = "";

    total = 0;

    document.getElementById("total").innerText = "₹0";
}

function onScanSuccess(decodedText){

    if(products[decodedText]){

        let product = products[decodedText];

        addToBill(product.name, product.price);

    }
    else{

        alert("Product not found");

    }

}

let scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps:10,
        qrbox:250
    }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>

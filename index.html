<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barcode Billing System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#ececec;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:430px;
    background:white;
    border-radius:25px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    font-size:38px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

#reader{
    width:100%;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:25px;
}

.add-product{
    background:#f7f7f7;
    padding:15px;
    border-radius:20px;
    margin-bottom:25px;
}

.add-product h2{
    margin-bottom:15px;
    text-align:center;
}

input{
    width:100%;
    height:45px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid #ccc;
    padding-left:12px;
    font-size:16px;
}

.add-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:15px;
    background:#6a00ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.bill{
    background:#fafafa;
    border-radius:20px;
    padding:20px;
    border:2px dashed #ccc;
}

.bill h2{
    text-align:center;
    margin-bottom:15px;
}

.bill-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:18px;
}

.total{
    margin-top:15px;
    border-top:2px solid #ddd;
    padding-top:10px;
    display:flex;
    justify-content:space-between;
    font-size:22px;
    font-weight:bold;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.action-btn{
    flex:1;
    height:55px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.print-btn{
    background:#6a00ff;
    color:white;
}

.clear-btn{
    background:#ff4d4d;
    color:white;
}

@media print{

    body{
        background:white;
    }

    #reader,
    .buttons,
    .add-product,
    .subtitle{
        display:none;
    }

    .container{
        width:80mm;
        box-shadow:none;
        padding:0;
    }

}

</style>

</head>

<body>

<div class="container">

    <h1>JPT Store</h1>

    <div class="subtitle">
        Barcode Billing System
    </div>

    <div id="reader"></div>

    <!-- ADD PRODUCT -->

    <div class="add-product">

        <h2>Add New Product</h2>

        <input type="text" id="barcode" placeholder="Enter Barcode">

        <input type="text" id="productName" placeholder="Enter Product Name">

        <input type="number" id="productPrice" placeholder="Enter Product Price">

        <button class="add-btn" onclick="addProduct()">
            Add Product
        </button>

    </div>

    <!-- BILL -->

    <div class="bill">

        <h2>Customer Bill</h2>

        <div id="billItems"></div>

        <div class="total">

            <span>Total</span>

            <span id="total">₹0</span>

        </div>

    </div>

    <!-- BUTTONS -->

    <div class="buttons">

        <button class="action-btn clear-btn" onclick="clearBill()">
            Clear
        </button>

        <button class="action-btn print-btn" onclick="window.print()">
            Print Bill
        </button>

    </div>

</div>

<script>

let total = 0;

/* PRODUCT DATABASE */

let products = {

    "12345":{
        name:"Burger",
        price:120
    },

    "23456":{
        name:"Pizza",
        price:250
    },

    "34567":{
        name:"Coffee",
        price:60
    },

    "45678":{
        name:"Fries",
        price:80
    }

};

/* ADD ITEM TO BILL */

function addToBill(name, price){

    let billItems = document.getElementById("billItems");

    let item = document.createElement("div");

    item.classList.add("bill-item");

    item.innerHTML = `
        <span>${name}</span>
        <span>₹${price}</span>
    `;

    billItems.appendChild(item);

    total += price;

    document.getElementById("total").innerText = "₹" + total;
}

/* CLEAR BILL */

function clearBill(){

    document.getElementById("billItems").innerHTML = "";

    total = 0;

    document.getElementById("total").innerText = "₹0";
}

/* ADD NEW PRODUCT */

function addProduct(){

    let barcode = document.getElementById("barcode").value;

    let name = document.getElementById("productName").value;

    let price = document.getElementById("productPrice").value;

    if(barcode === "" || name === "" || price === ""){

        alert("Please fill all fields");

        return;
    }

    products[barcode] = {

        name:name,
        price:Number(price)

    };

    alert("Product Added Successfully");

    document.getElementById("barcode").value = "";

    document.getElementById("productName").value = "";

    document.getElementById("productPrice").value = "";
}

/* SCAN SUCCESS */

function onScanSuccess(decodedText){

    if(products[decodedText]){

        let product = products[decodedText];

        addToBill(product.name, product.price);

    }
    else{

        alert("Product Not Found");

    }

}

/* START CAMERA */
/* BACK CAMERA ENABLED */

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

    if(devices && devices.length){

        let backCamera = devices.find(device =>
            device.label.toLowerCase().includes('back')
        );

        let cameraId = backCamera ? backCamera.id : devices[0].id;

        html5QrCode.start(

            cameraId,

            {
                fps:10,
                qrbox:250
            },

            onScanSuccess

        );

    }

}).catch(err => {

    console.log(err);

});

</script>

</body>
</html>

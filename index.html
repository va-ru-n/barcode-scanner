<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Restaurant Billing System</title>

<!-- QR SCANNER -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- BARCODE GENERATOR -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#ececec;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:450px;
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* NAVIGATION */

.nav{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.nav button{
    flex:1;
    height:45px;
    border:none;
    border-radius:12px;
    background:#6a00ff;
    color:white;
    font-size:15px;
    cursor:pointer;
    font-weight:bold;
}

/* PAGES */

.page{
    display:none;
}

.active{
    display:block;
}

/* TITLES */

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

/* SCANNER */

#reader{
    width:100%;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:20px;
}

/* BILL */

.bill{
    background:#fafafa;
    border-radius:20px;
    padding:20px;
    border:2px dashed #ccc;
}

.bill h2{
    text-align:center;
    margin-bottom:15px;
}

.bill-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    padding-bottom:10px;
    border-bottom:1px solid #ddd;
}

.qty-box{
    display:flex;
    align-items:center;
    gap:5px;
}

.qty-btn{
    width:28px;
    height:28px;
    border:none;
    border-radius:50%;
    background:#6a00ff;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:8px;
    cursor:pointer;
}

.total{
    margin-top:15px;
    border-top:2px solid #ddd;
    padding-top:10px;
    display:flex;
    justify-content:space-between;
    font-size:22px;
    font-weight:bold;
}

/* BUTTONS */

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.action-btn{
    flex:1;
    height:50px;
    border:none;
    border-radius:15px;
    color:white;
    font-size:17px;
    cursor:pointer;
    font-weight:bold;
}

.print-btn{
    background:#6a00ff;
}

.clear-btn{
    background:red;
}

/* INPUTS */

input{
    width:100%;
    height:45px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid #ccc;
    padding-left:10px;
    font-size:16px;
}

.add-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:15px;
    background:#6a00ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

/* PRODUCT PAGE */

.product-card{
    background:#fafafa;
    border-radius:20px;
    padding:15px;
    margin-bottom:20px;
    text-align:center;
    border:1px solid #ddd;
}

.product-card h3{
    margin-bottom:10px;
}

.product-card p{
    margin-bottom:10px;
}

svg{
    width:100%;
    max-width:250px;
}

/* PRINT */

@media print{

    body{
        background:white;
    }

    .nav,
    #reader,
    .buttons,
    .qty-btn,
    .remove-btn{
        display:none;
    }

    .container{
        width:80mm;
        box-shadow:none;
        padding:0;
    }

}

</style>

</head>

<body>

<div class="container">

    <!-- NAVIGATION -->

    <div class="nav">

        <button onclick="showPage('billingPage')">
            Billing
        </button>

        <button onclick="showPage('addPage')">
            Add Product
        </button>

        <button onclick="showPage('productsPage')">
            Products
        </button>

    </div>

    <!-- BILLING PAGE -->

    <div id="billingPage" class="page active">

        <h1>JPT Store</h1>

        <div class="subtitle">
            Scan Products & Print Bills
        </div>

        <div id="reader"></div>

        <div class="bill">

            <h2>Customer Bill</h2>

            <div id="billItems"></div>

            <div class="total">

                <span>Total</span>

                <span id="total">₹0</span>

            </div>

        </div>

        <div class="buttons">

            <button class="action-btn clear-btn"
            onclick="clearBill()">
            Clear
            </button>

            <button class="action-btn print-btn"
            onclick="window.print()">
            Print
            </button>

        </div>

    </div>

    <!-- ADD PRODUCT PAGE -->

    <div id="addPage" class="page">

        <h1>Add Product</h1>

        <input type="text"
        id="barcode"
        placeholder="Enter Barcode">

        <input type="text"
        id="productName"
        placeholder="Enter Product Name">

        <input type="number"
        id="productPrice"
        placeholder="Enter Product Price">

        <button class="add-btn"
        onclick="addProduct()">
        Add Product
        </button>

    </div>

    <!-- PRODUCTS PAGE -->

    <div id="productsPage" class="page">

        <h1>Products</h1>

        <div id="productList"></div>

    </div>

</div>

<script>

/* MOBILE FRIENDLY BEEP */

function playBeep(){

    const beep = new Audio(
    "https://actions.google.com/sounds/v1/cartoon/beep_short.ogg"
    );

    beep.volume = 1;

    beep.play().catch(err => {

        console.log(err);

    });

}

/* PRODUCT DATABASE */

let products = {

    "12345":{
        name:"Burger",
        price:120
    },

    "23456":{
        name:"Pizza",
        price:250
    },

    "34567":{
        name:"Coffee",
        price:60
    }

};

let bill = {};

let total = 0;

/* PAGE SWITCH */

function showPage(pageId){

    let pages =
    document.querySelectorAll(".page");

    pages.forEach(page => {

        page.classList.remove("active");

    });

    document.getElementById(pageId)
    .classList.add("active");

}

/* ADD PRODUCT */

function addProduct(){

    let barcode =
    document.getElementById("barcode").value;

    let name =
    document.getElementById("productName").value;

    let price =
    document.getElementById("productPrice").value;

    if(barcode === "" ||
       name === "" ||
       price === ""){

        alert("Please fill all fields");

        return;
    }

    products[barcode] = {

        name:name,
        price:Number(price)

    };

    alert("Product Added Successfully");

    document.getElementById("barcode").value = "";

    document.getElementById("productName").value = "";

    document.getElementById("productPrice").value = "";

    renderProducts();

}

/* RENDER PRODUCTS */

function renderProducts(){

    let productList =
    document.getElementById("productList");

    productList.innerHTML = "";

    for(let code in products){

        let product = products[code];

        let card =
        document.createElement("div");

        card.classList.add("product-card");

        card.innerHTML = `

            <h3>${product.name}</h3>

            <p>₹${product.price}</p>

            <svg id="barcode-${code}"></svg>

        `;

        productList.appendChild(card);

        JsBarcode(

            `#barcode-${code}`,

            code,

            {
                format:"CODE128",
                displayValue:true
            }

        );

    }

}

/* ADD TO BILL */

function addToBill(barcode){

    playBeep();

    let product = products[barcode];

    if(bill[barcode]){

        bill[barcode].qty++;

    }
    else{

        bill[barcode] = {

            name:product.name,
            price:product.price,
            qty:1

        };

    }

    renderBill();

}

/* RENDER BILL */

function renderBill(){

    let billItems =
    document.getElementById("billItems");

    billItems.innerHTML = "";

    total = 0;

    for(let code in bill){

        let item = bill[code];

        total += item.price * item.qty;

        let div =
        document.createElement("div");

        div.classList.add("bill-item");

        div.innerHTML = `

            <div>

                <b>${item.name}</b><br>

                ₹${item.price} x ${item.qty}

            </div>

            <div class="qty-box">

                <button class="qty-btn"
                onclick="changeQty('${code}', -1)">
                -
                </button>

                ${item.qty}

                <button class="qty-btn"
                onclick="changeQty('${code}', 1)">
                +
                </button>

                <button class="remove-btn"
                onclick="removeItem('${code}')">
                X
                </button>

            </div>

        `;

        billItems.appendChild(div);

    }

    document.getElementById("total")
    .innerText = "₹" + total;

}

/* CHANGE QUANTITY */

function changeQty(code, value){

    bill[code].qty += value;

    if(bill[code].qty <= 0){

        delete bill[code];

    }

    renderBill();

}

/* REMOVE ITEM */

function removeItem(code){

    delete bill[code];

    renderBill();

}

/* CLEAR BILL */

function clearBill(){

    bill = {};

    renderBill();

}

/* SCANNER FIX */

let lastScannedCode = "";

let scanCooldown = false;

/* SCAN SUCCESS */

function onScanSuccess(decodedText){

    if(scanCooldown){
        return;
    }

    if(decodedText === lastScannedCode){
        return;
    }

    lastScannedCode = decodedText;

    scanCooldown = true;

    setTimeout(() => {

        scanCooldown = false;

        lastScannedCode = "";

    }, 2000);

    if(products[decodedText]){

        addToBill(decodedText);

    }
    else{

        alert("Product Not Found");

    }

}

/* START CAMERA */
/* BACK CAMERA */

const html5QrCode =
new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(devices => {

    if(devices && devices.length){

        let backCamera =
        devices.find(device =>
            device.label
            .toLowerCase()
            .includes('back')
        );

        let cameraId =
        backCamera ?
        backCamera.id :
        devices[0].id;

        html5QrCode.start(

            cameraId,

            {
                fps:10,
                qrbox:250
            },

            onScanSuccess

        );

    }

}).catch(err => {

    console.log(err);

});

/* INITIAL PRODUCTS */

renderProducts();

</script>

</body>

</html>
